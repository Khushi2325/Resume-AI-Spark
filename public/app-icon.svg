<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Resume AI Spark</title>
  <desc id="desc">Premium app icon for Resume AI Spark — a stylized document with an AI spark emblem.</desc>
  <defs>
    <!-- Deep navy-to-indigo background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a1060"/>
    </linearGradient>
    <!-- Sky-blue spark glow -->
    <radialGradient id="sparkGlow" cx="65%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <!-- Document white glow -->
    <radialGradient id="docGlow" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Resume page gradient -->
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef3ff"/>
    </linearGradient>
    <!-- Spark/lightning gradient -->
    <linearGradient id="sparkLine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="glowFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" rx="52" fill="url(#bgGrad)"/>

  <!-- Ambient glow layers -->
  <rect width="256" height="256" rx="52" fill="url(#sparkGlow)"/>
  <rect width="256" height="256" rx="52" fill="url(#docGlow)"/>

  <!-- Subtle grid dots (decorative) -->
  <g opacity="0.08" fill="#ffffff">
    <circle cx="40"  cy="40"  r="1.5"/>
    <circle cx="80"  cy="40"  r="1.5"/>
    <circle cx="40"  cy="80"  r="1.5"/>
    <circle cx="216" cy="216" r="1.5"/>
    <circle cx="176" cy="216" r="1.5"/>
    <circle cx="216" cy="176" r="1.5"/>
  </g>

  <!-- Resume document (slightly tilted for dynamism) -->
  <g transform="rotate(-4, 128, 128)" filter="url(#shadow)">
    <rect x="62" y="68" width="122" height="148" rx="9" fill="url(#pageGrad)"/>
    <!-- Subtle page border -->
    <rect x="62" y="68" width="122" height="148" rx="9" fill="none" stroke="#c7d2fe" stroke-width="1"/>
    <!-- Header bar on the doc -->
    <rect x="62" y="68" width="122" height="30" rx="9" fill="#3b4fd8" opacity="0.12"/>
    <!-- Name line (bold, wide) -->
    <rect x="76" y="82" width="68" height="5" rx="2.5" fill="#1e293b"/>
    <!-- Subtitle line -->
    <rect x="76" y="92" width="44" height="3" rx="1.5" fill="#64748b"/>
    <!-- Divider -->
    <line x1="76" y1="104" x2="172" y2="104" stroke="#e2e8f0" stroke-width="1.2"/>
    <!-- Section lines -->
    <rect x="76" y="110" width="30" height="2.5" rx="1.2" fill="#3b82f6" opacity="0.7"/>
    <rect x="76" y="117" width="88" height="2" rx="1" fill="#94a3b8"/>
    <rect x="76" y="122" width="78" height="2" rx="1" fill="#94a3b8"/>
    <rect x="76" y="127" width="82" height="2" rx="1" fill="#94a3b8"/>
    <!-- Section 2 -->
    <rect x="76" y="136" width="36" height="2.5" rx="1.2" fill="#3b82f6" opacity="0.7"/>
    <rect x="76" y="143" width="88" height="2" rx="1" fill="#94a3b8"/>
    <rect x="76" y="148" width="70" height="2" rx="1" fill="#94a3b8"/>
    <!-- Section 3 -->
    <rect x="76" y="157" width="28" height="2.5" rx="1.2" fill="#3b82f6" opacity="0.7"/>
    <rect x="76" y="164" width="88" height="2" rx="1" fill="#94a3b8"/>
    <rect x="76" y="169" width="60" height="2" rx="1" fill="#94a3b8"/>
    <rect x="76" y="174" width="75" height="2" rx="1" fill="#94a3b8"/>
    <rect x="76" y="179" width="50" height="2" rx="1" fill="#94a3b8"/>
    <!-- Section 4 -->
    <rect x="76" y="188" width="32" height="2.5" rx="1.2" fill="#3b82f6" opacity="0.7"/>
    <rect x="76" y="195" width="88" height="2" rx="1" fill="#94a3b8"/>
    <rect x="76" y="200" width="65" height="2" rx="1" fill="#94a3b8"/>
  </g>

  <!-- AI Spark badge (top-right corner, overlapping the doc) -->
  <g transform="rotate(4, 128, 128)">
    <!-- Badge circle background -->
    <circle cx="176" cy="84" r="36" fill="url(#bgGrad)" opacity="0.95"/>
    <circle cx="176" cy="84" r="36" fill="none" stroke="#38bdf8" stroke-width="1.8" opacity="0.6"/>
    <!-- Inner glow ring -->
    <circle cx="176" cy="84" r="29" fill="#38bdf8" opacity="0.08"/>

    <!-- Lightning bolt / spark icon -->
    <path
      d="M179 60 L168 82 L176 82 L173 108 L188 82 L180 82 Z"
      fill="url(#sparkLine)"
      filter="url(#glowFilter)"
    />
  </g>

  <!-- Bottom label band -->
  <rect x="0" y="220" width="256" height="36" rx="0" fill="#000000" opacity="0.3"/>
  <rect x="0" y="240" width="256" height="16" rx="0" fill="#000000" opacity="0.2"/>
  <!-- Round bottom corners to match container -->
  <rect x="0" y="220" width="52" height="36" fill="url(#bgGrad)" opacity="0.3"/>
  <rect x="204" y="220" width="52" height="36" fill="url(#bgGrad)" opacity="0.3"/>

  <!-- "AI" text in badge area -->
  <text x="176" y="88" font-family="'Inter', 'SF Pro Display', system-ui, sans-serif" font-size="11" font-weight="800" fill="white" text-anchor="middle" letter-spacing="1" opacity="0.0">AI</text>
</svg>